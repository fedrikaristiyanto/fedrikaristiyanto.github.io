<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>character counter</title>
  <link href="/css/hf.css"  rel="stylesheet" type="text/css" />
  <link href="/css/Input.css"  rel="stylesheet" type="text/css" />
</head>
<body>
<div id="header">
<h3>penghitung karakter</h3>
</div>
<textarea id="txt" class="input2"></textarea><br>
<button style="cursor:pointer;padding:5px;" onclick="count()">count</button>
<div style="background-color:color-mix(in srgb, yellow 25%, cyan 25%);">
  <p>total karakter: <span id="o"></span></p>
<p>angka: <span id="D"></span></p>

<p>huruf: <span id="lt"></span></p>
</div>
  <div id="footer">fedrikaristiyanto.github.io</div>
  <script>
function count(){
  var i = document.getElementById("txt").value;
  var dgit = new RegExp(/\d/g);
  var letter = new RegExp(/[A-Za-z]/g);
  var c = i.length;
  var d= i.match(dgit);
var l = i.match(letter);
  document.getElementById("o").innerHTML=c + " termasuk huruf, angka, spasi, new line, atau lainnya";
document.getElementById("D").innerHTML=d ? d.length : 0;
document.getElementById("lt").innerHTML=l ? l.length : 0;
}
</script>
</body>
</html>
