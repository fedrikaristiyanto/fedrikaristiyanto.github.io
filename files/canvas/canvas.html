<!DOCTYPE html>
<html>
<head>
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <canvas id="myCanvas" width="400" height="400" style="border:1px solid #000;"></canvas>

  <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.ellipse(
      200, 150,   // x, y (titik tengah)
      100, 25,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(
      200, 145,   // x, y (titik tengah)
      110, 30,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.stroke();

    ctx.beginPath();
ctx.moveTo(90, 145);
ctx.lineTo(110, 250);
ctx.bezierCurveTo(110, 300, 290, 300, 290,250);
ctx.lineTo(310,145);

ctx.stroke();
  </script>
</body>
</html>
