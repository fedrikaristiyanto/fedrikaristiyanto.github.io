<!DOCTYPE html>
<html>
<head>
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <style>
 canvas{ background-color:snow;box-shadow: 5px 5px 15px 0px rgba(0, 0, 0, 0.20);
border-radius: 8px;
       transform:scale(0.5);
       }
   </style>
</head>
<body>
  <canvas id="myCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.ellipse(
      200, 150,   // x, y (titik tengah)
      100, 25,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(
      200, 145,   // x, y (titik tengah)
      110, 30,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.stroke();

    ctx.beginPath();
ctx.moveTo(90, 145);
ctx.lineTo(110, 250);
ctx.bezierCurveTo(110, 300, 290, 300, 290,250);
ctx.lineTo(310,145);

ctx.stroke();

    ctx.beginPath();
        ctx.ellipse(200, 280, 150, 45, 0, 0, 1.25* Math.PI);
ctx.lineWidth="2";
        ctx.stroke();

ctx.beginPath();
        ctx.moveTo(320, 160);
        ctx.quadraticCurveTo(390, 140, 310, 230); 
        
        ctx.lineWidth = "2";
        ctx.stroke();

    // ASAP 
ctx.strokeStyle = "#999";
ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(185, 100);
ctx.bezierCurveTo(150, 80, 195, 60, 185, 30);

ctx.stroke();


ctx.beginPath();
ctx.moveTo(220, 100);
ctx.bezierCurveTo(175, 80, 225, 60, 220, 10);

ctx.stroke();

    ctx.font="12px cursive";
    ctx.fillText("Fedrik Aristiyanto", 200, 380);
  </script>
</body>
</html>
