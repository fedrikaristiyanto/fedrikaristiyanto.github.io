<!DOCTYPE html>
<html>
<head>
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <style>
 #myCanvas{ background-color:snow;box-shadow: 5px 5px 15px 0px rgba(0, 0, 0, 0.20);
border-radius: 8px;
       transform:scale(0.5);
       }
   </style>
</head>
<body>
  <canvas id="myCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.ellipse(
      200, 150,   // x, y (titik tengah)
      100, 25,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(
      200, 145,   // x, y (titik tengah)
      110, 30,    // radiusX, radiusY
      0,          // rotasi
      0,          // start angle
      2 * Math.PI // end angle
    );
    ctx.stroke();

    ctx.beginPath();
ctx.moveTo(90, 145);
ctx.lineTo(110, 250);
ctx.bezierCurveTo(110, 300, 290, 300, 290,250);
ctx.lineTo(310,145);

ctx.stroke();

    ctx.beginPath();
        ctx.ellipse(200, 280, 150, 45, 0, 0, 1.25* Math.PI);
ctx.lineWidth="2";
        ctx.stroke();

ctx.beginPath();
        ctx.moveTo(320, 160);
        ctx.quadraticCurveTo(390, 140, 310, 230); 
        
        ctx.lineWidth = "2";
        ctx.stroke();

    // ASAP 
ctx.strokeStyle = "#999";
ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(185, 100);
ctx.bezierCurveTo(150, 80, 195, 60, 185, 30);

ctx.stroke();


ctx.beginPath();
ctx.moveTo(220, 100);
ctx.bezierCurveTo(175, 80, 225, 60, 220, 10);

ctx.stroke();

    ctx.font="italic 10px cursive";
    ctx.fillText("Fedrik Aristiyanto", 300, 380);
  </script>

  <canvas id="c" width="400" height="300"></canvas>

<script>
var c = document.getElementById("c");
var cx = c.getContext("2d");
cx.fillStyle = "midnightblue";
cx.fillRect(0, 0, 500, 300);
  
// full moon
cx.beginPath();
cx.arc(300, 80, 45, 0, Math.PI * 2);
cx.fillStyle = "white";


// glow moon
  cx.shadowColor = "white";
cx.shadowBlur = 50;    
cx.shadowOffsetX = 0;
cx.shadowOffsetY = 0;
cx.fill();
cx.shadowBlur=0;

  const stars = [
  { x: 50, y: 40, r: 1.2 },
  { x: 120, y: 80, r: 1 },
  { x: 200, y: 30, r: 1.5 },
  { x: 260, y: 90, r: 1 },
  { x: 320, y: 50, r: 1.3 },
  { x: 80, y: 140, r: 1 },
  { x: 150, y: 160, r: 1.4 },
  { x: 230, y: 120, r: 1 },
  { x: 300, y: 150, r: 1.2 },
  { x: 390, y: 110, r: 1 }
];

stars.forEach(star => {
  cx.beginPath();
  cx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
  cx.fillStyle = "white";
  cx.fill();
});

  cx.beginPath();
  cx.moveTo(0, 300);
  cx.lineTo(150, 200);
cx.lineTo(300, 300);
cx.closePath();

cx.moveTo(200,300);
cx.lineTo(300, 250);
cx.lineTo(400, 300);
cx.closePath();

  cx.fillStyle = "#0a0a0a";
  cx.fill();
  
</script>
</body>
</html>
